<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5d77a"/>
      <stop offset="30%" stop-color="#d4af37"/>
      <stop offset="50%" stop-color="#e0c576"/>
      <stop offset="70%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <filter id="goldShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#d4af37" flood-opacity="0.3"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#d4af37" flood-opacity="0.2"/>
      <feComposite in2="blur" operator="in"/>
      <feComposite in="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>
  <rect x="8" y="8" width="496" height="496" rx="104" fill="none" stroke="#d4af37" stroke-width="2" opacity="0.3"/>
  <text x="256" y="340" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="280" font-weight="bold" fill="url(#goldGrad)" filter="url(#goldShadow)">S</text>
</svg>
